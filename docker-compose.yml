version: '3'
services:
  connector-bdu:
    image: leitosama/opencti-connector-bdu:latest
    environment:
      - OPENCTI_URL=http://localhost
      - OPENCTI_TOKEN=ChangeMe
      - CONNECTOR_ID=ChangeMe
      - CONNECTOR_NAME=FSTEC BDU
      - CONNECTOR_SCOPE=bdu
      - CONNECTOR_LOG_LEVEL=error
      # - BDU_BASE_URL=https://bdu.fstec.ru/files/documents/vulxml.zip
      # - BDU_BATCH_SIZE=100 # Optional, process elements
      # - BDU_INTERVAL=2 # Optional, in hours advice min 2
    restart: always
